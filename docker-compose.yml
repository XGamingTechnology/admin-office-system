# 🐳 Docker Compose - Office Admin System
# Versi 3.8 dihapus karena obsolete di Docker Compose v2+

services:
  # 🗄️ PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: office_admin_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - office_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 🔌 Backend NestJS
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: office_admin_backend
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - NODE_ENV=production
      - PORT=3000 # 📌 Port internal container (tetap 3000)
      - CORS_ORIGIN=https://office.getopurtunity.online
    # 🌐 Map Host:3001 → Container:3000 (localhost only)
    ports:
      - "127.0.0.1:8080:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - office_network
    command: sh -c "sleep 5 && node dist/main"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/office/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # 🎨 Frontend React + Vite + Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: office_admin_frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=https://office.getopurtunity.online/api/office
    # 🌐 Map Host:5173 → Container:80 (localhost only)
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - backend
    networks:
      - office_network

volumes:
  db_data:

networks:
  office_network:
    driver: bridge
